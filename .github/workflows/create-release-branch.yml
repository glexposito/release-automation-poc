name: Open team release

on:
  push:
    branches:
      - minor

  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release-branch:
    name: Open team release
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout minor
        uses: actions/checkout@v6
        with:
          ref: minor
          fetch-depth: 0

      - name: Determine next release version
        id: version
        run: |
          latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          latest_tag="${latest_tag:-v0.0.0}"
          version="${latest_tag#v}"
          IFS='.' read -r major minor _patch <<< "$version"
          next_minor=$((minor + 1))
          echo "branch=release/${major}.${next_minor}.0" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: |
          branch="${{ steps.version.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "refs/heads/${branch}" >/dev/null; then
            echo "::error::${branch} already exists on origin. Refusing to overwrite an existing release branch."
            exit 1
          fi
          git push origin HEAD:refs/heads/"${branch}"

      - name: Post ADO links
        run: |
          {
            echo "## Release ${{ steps.version.outputs.branch }}"
            echo ""
            echo "- 🔨 [Watch the build](https://dev.azure.com/<ORG>/<PROJECT>/_build) — the latest run for \`${{ steps.version.outputs.branch }}\` will be at the top"
            echo "- 🚀 Once the build finishes, the deployment release is auto-created here: [Releases](https://dev.azure.com/<ORG>/<PROJECT>/_release) — the latest one will be at the top"
          } >> "$GITHUB_STEP_SUMMARY"
