name: Create release branch from minor

on:
  push:
    branches:
      - team/develop

  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release-branch:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout minor
        uses: actions/checkout@v6
        with:
          ref: minor
          fetch-depth: 0

      - name: Determine next release version
        id: version
        run: |
          latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          latest_tag="${latest_tag:-v0.0.0}"
          version="${latest_tag#v}"
          IFS='.' read -r major minor _patch <<< "$version"
          next_minor=$((minor + 1))
          echo "branch=release/${major}.${next_minor}.0" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: git push origin HEAD:refs/heads/${{ steps.version.outputs.branch }}
